<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <title>VoidQuest 32-bit</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0f14">

  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

</head>
<body class="portal-body">

  <div class="portal-wrap">
    <div class="portal-card">

      <div class="portal-top">
        <img class="portal-logo" src="assets/ui/logo.png" alt="VoidQuest logo" />
        <div class="portal-title">VoidQuest 32-bit</div>
        <div class="portal-sub">Account Gateway</div>
      </div>

      <div class="portal-main">
        <div class="portal-panel">
          <div class="portal-panel-title">Logg inn</div>

          <label class="portal-label" for="auth-email">Email</label>
          <input id="auth-email" class="portal-input" type="email" placeholder="you@example.com" />

          <label class="portal-label" for="auth-pass">Passord</label>
          <input id="auth-pass" class="portal-input" type="password" placeholder="••••••••" />

          <div class="portal-actions">
            <button id="btn-login" class="portal-btn">Log in</button>
            <button id="btn-signup" class="portal-btn secondary">Create account</button>
          </div>

          <div id="auth-status" class="portal-status"></div>
        </div>

        <div class="portal-side">
          <div class="portal-panel">
            <div class="portal-panel-title">Status</div>
            <div class="portal-kv"><span>Server</span><b class="ok">ONLINE</b></div>
            <div class="portal-kv"><span>Version</span><b>v0.0.1</b></div>
            <div class="portal-kv"><span>Tip</span><b>Use strong passwords</b></div>
          </div>

          <div class="portal-panel">
            <div class="portal-panel-title">Latest News</div>
            <div class="portal-news">• Velkommen! (tekst kan du endre senere)</div>
            <div class="portal-news">• Events kommer senere</div>
          </div>
        </div>
      </div>

      <div class="portal-footer">
        © 2026 VoidQuest • Powered by Supabase
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
